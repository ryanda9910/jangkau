name: CI

# Runs on every push and PR. Fast, deterministic, NO network — so it never
# flakes on a slow/blocked upstream API. Live-endpoint checks run separately
# in health.yml on a schedule (a red upstream must not block a merge).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Verify zero runtime dependencies
        run: |
          node -e "const p=require('./package.json'); if(p.dependencies&&Object.keys(p.dependencies).length){console.error('jangkau must stay zero-dep');process.exit(1)}"
      - name: Syntax-check every source file
        run: for f in $(find src bin -name '*.mjs' -o -name '*.js'); do node --check "$f"; done
      - name: All channels load + expose a valid contract
        run: |
          node --input-type=module -e "
            import { CHANNELS } from './src/channels/index.mjs';
            const names = Object.keys(CHANNELS);
            if (names.length < 19) { console.error('expected >=19 channels, got', names.length); process.exit(1); }
            for (const [k, ch] of Object.entries(CHANNELS)) {
              for (const f of ['run','check']) if (typeof ch[f] !== 'function') { console.error(k,'missing',f); process.exit(1); }
              if (!ch.meta?.name || !ch.meta?.usage) { console.error(k,'bad meta'); process.exit(1); }
            }
            console.log(names.length, 'channels OK:', names.join(', '));
          "
      - name: Offline unit tests
        run: node test-unit.mjs
